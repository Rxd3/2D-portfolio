<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>proto2d</title>
  </head>
  <body>

    <style>
      @font-face {
        font-family: monogram;
        src: url("monogram.ttf") ;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body{font-family: monogram, monospace;
        font-size: 2.5rem;
        overflow: hidden;
      }


      #app {
        width: 100%;
        height: 100dvh;
        margin: 0;
        position: relative;
      }

      #game {
        display: block;
      }

      #textbox {
        position:absolute;
        left:10%;
        right:10%;
        bottom:2vh;
        min-height: 10vh;
        max-height: 70dvh;
        box-sizing: border-box;
        background: white;
        border-radius: 3px;
        outline:  solid;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        flex-wrap: nowrap;
        justify-content: flex-start;
        word-spacing: 0.2rem;
        overflow: hidden;
        filter: drop-shadow(0px 0px 0.7rem rgb(112, 112, 112));
      }
      .ui-text {
        width: 100%;
        min-height: 0;
        margin: 0;
        overflow-y: auto;
        overflow-x: hidden;
        overflow-wrap: anywhere;
        overscroll-behavior: contain;
        touch-action: pan-y;
        -webkit-overflow-scrolling: touch;
        user-select: none;
      }

      .ui-close-btn {
        font-family: monogram, monospace;
        font-size: inherit;
        border-style: none;
        border-radius: 3px;
        padding: 1rem;
       
      }
      .btn-container {
        align-self: flex-end;
        margin-top: 1rem;
      }
      .note {
        position: absolute;
        top: 1vh;
        left: 5%;
       display:flex;
       flex-direction: column;
       color: rgb(238, 238, 238);
       user-select: none;
      }

      @media (max-width: 600px) {
        body {
          font-size: 1.4rem;
          line-height: 1.3;
        }

        #textbox {
          left: 0.75rem;
          right: 0.75rem;
          bottom: max(0.75rem, env(safe-area-inset-bottom));
          min-height: 0;
          max-height: 65dvh;
          padding: 0.8rem;
          word-spacing: 0.05rem;
        }

        .ui-text {
          line-height: 1.35;
          padding-right: 0.25rem;
        }

        .btn-container {
          flex: 0 0 auto;
          margin-top: 0.6rem;
        }

        .ui-close-btn {
          padding: 0.55rem 0.9rem;
        }

        .note {
          top: max(0.5rem, env(safe-area-inset-top));
          left: 0.75rem;
          right: 0.75rem;
          font-size: 1.1rem;
          line-height: 1.2;
        }
      }
    </style>
      
    <div id="app">
      <div id="ui">
        <p class="note">tap/click around to move or use WASD</p>
          <div id="textbox-container" style="display: none;">
              <div id ="textbox"><p id="dialog" class="ui-text"></p>
                <div class="btn-container">
                  <button id="close" class="ui-close-btn">close</button>
                </div>
               </div>
          </div>
      </div>
      <canvas id="game" ></canvas>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
